<!DOCTYPE html>
<html>
  <body>
    <h1>Basic Stock Stats</h1>

    <form method="POST">
      <input name="ticker" type="text" placeholder="Enter ticker" required>
      <button type="submit" name="action" value="stats">Get Quant Stats</button>
      <button type="submit" name="action" value="kpis">Get Fundamental Stats</button>
    </form>

    {% if error %}
      <p>{{ error }}</p>
    {% endif %}

    {% if result %}
      <pre>{{ result }}</pre>
    {% endif %}
  </body>
</html>
